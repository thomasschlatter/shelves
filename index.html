<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vinyl Record Storage — Model Gallery</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { display: flex; height: 100%; background: #0f1114; color: #e9edf2; }
  #side { width: 300px; flex: none; background: #16181d; border-right: 1px solid #262a31;
    overflow-y: auto; padding: 14px 0; }
  #side h1 { font-size: 15px; margin: 6px 18px 2px; }
  #side .sub { font-size: 11px; color: #8a94a0; margin: 0 18px 14px; }
  .group { font-size: 10.5px; letter-spacing: .6px; text-transform: uppercase;
    color: #6f7681; margin: 16px 18px 5px; }
  .item { display: block; padding: 8px 18px; font-size: 13px; color: #c4ccd4;
    cursor: pointer; border-left: 3px solid transparent; }
  .item small { display: block; color: #7f8a96; font-size: 11px; margin-top: 1px; }
  .item:hover { background: #1e2127; color: #fff; }
  .item.active { background: #23262d; color: #fff; border-left-color: #d9a066; }
  #main { flex: 1; position: relative; }
  #frame { width: 100%; height: 100%; border: 0; background: #0f1114; }
  #bar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(20,22,26,.8); border: 1px solid #2a2f36; border-radius: 20px;
    padding: 6px 14px; font-size: 12px; color: #cdd4dc; display: flex; gap: 12px; align-items: center; }
  #bar b { color: #fff; }
  #bar a { color: #d9a066; text-decoration: none; }
  .navbtn { cursor: pointer; color: #9aa4ae; padding: 0 4px; user-select: none; }
  .navbtn:hover { color: #fff; }
  @media (max-width: 720px) { #side { width: 200px; } }
</style>
</head>
<body>
<div id="app">
  <nav id="side">
    <h1>Vinyl Record Storage</h1>
    <div class="sub">Parametric models · 22 mm plywood</div>
    <div id="menu"></div>
  </nav>
  <div id="main">
    <div id="bar">
      <span class="navbtn" id="prev">◀</span>
      <span><b id="curName">—</b> · <span id="curDesc"></span></span>
      <span class="navbtn" id="next">▶</span>
      <a id="openNew" href="#" target="_blank">open ↗</a>
    </div>
    <iframe id="frame" src=""></iframe>
  </div>
</div>
<script>
const MODELS = [
  { group: "Original 8-cubby cabinet (2-level)", items: [
    { f: "viewer.html", n: "Standard", d: "55¼ × 26¼ × 18½ in, 8 cubbies" },
    { f: "viewer_compact.html", n: "Compact", d: "shallower (18¼ in deep)" },
  ]},
  { group: "7-inch (45 rpm) middle sections (2-level)", items: [
    { f: "viewer_7inch.html", n: "2× 7″ middle", d: "2 LP + 2 forty-five columns" },
    { f: "viewer_compact_7inch.html", n: "2× 7″ · compact", d: "shallow depth" },
    { f: "viewer_7inch_x3.html", n: "3× 7″ middle", d: "2 LP + 3 forty-fives" },
    { f: "viewer_compact_7inch_x3.html", n: "3× 7″ · compact", d: "shallow depth" },
    { f: "viewer_7inch_x4.html", n: "4× 7″ middle", d: "2 LP + 4 forty-fives (wide)" },
    { f: "viewer_compact_7inch_x4.html", n: "4× 7″ · compact", d: "shallow depth" },
  ]},
  { group: "Simple single-level 45 bins", items: [
    { f: "viewer_simple_7inch.html", n: "Slanted 4× 7″", d: "browse-from-top bin" },
    { f: "viewer_simple_7inch_flat.html", n: "Flat 5× 7″ (deep)", d: "flat-walled crate on legs" },
  ]},
  { group: "One-board project (bin + cabinet)", items: [
    { f: "viewer_board_bin.html", n: "Board-bin", d: "deep 5× 7″, bottom = your offcut" },
    { f: "viewer_shelf2.html", n: "Cabinet 36 cm", d: "2-level 2×12″ (recommended)" },
    { f: "viewer_shelf2_51.html", n: "Cabinet 51 cm", d: "deepest on one board" },
    { f: "viewer_shelf2_shallow.html", n: "Cabinet 26 cm", d: "shallowest / cleanest cut" },
  ]},
];

const flat = [];
const menu = document.getElementById("menu");
for (const g of MODELS) {
  const h = document.createElement("div"); h.className = "group"; h.textContent = g.group;
  menu.appendChild(h);
  for (const it of g.items) {
    const idx = flat.length; flat.push(it);
    const a = document.createElement("div"); a.className = "item";
    a.innerHTML = `${it.n}<small>${it.d}</small>`;
    a.onclick = () => select(idx);
    it.el = a; menu.appendChild(a);
  }
}

let cur = 0;
function select(i) {
  cur = (i + flat.length) % flat.length;
  const it = flat[cur];
  flat.forEach(m => m.el.classList.toggle("active", m === it));
  document.getElementById("frame").src = it.f;
  document.getElementById("curName").textContent = it.n;
  document.getElementById("curDesc").textContent = it.d;
  document.getElementById("openNew").href = it.f;
  it.el.scrollIntoView({ block: "nearest" });
}
document.getElementById("prev").onclick = () => select(cur - 1);
document.getElementById("next").onclick = () => select(cur + 1);
addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") select(cur - 1);
  if (e.key === "ArrowRight") select(cur + 1);
});
select(10);   // start on the board-bin project
</script>
</body>
</html>
